<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXO Access Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
padding:30px;
}
body:before{
content:"";
position:fixed;
width:450px;
height:450px;
background:#2563eb;
filter:blur(160px);
top:-150px;
left:-120px;
opacity:.35;
z-index:-1;
}
body:after{
content:"";
position:fixed;
width:450px;
height:450px;
background:#7c3aed;
filter:blur(160px);
bottom:-150px;
right:-120px;
opacity:.35;
z-index:-1;
}
.wrap{max-width:1300px;margin:auto}
.top{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:25px;
}
h1{font-size:46px}
p{color:#94a3b8}
input{
padding:14px 18px;
background:rgba(255,255,255,.08);
border:0;
color:#fff;
border-radius:16px;
}
button{
border:0;
padding:12px 18px;
margin:4px;
border-radius:12px;
font-weight:700;
color:#fff;
cursor:pointer;
}
.add{background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.ban{background:#ef4444}
.unban{background:#22c55e}
.del{background:#f59e0b}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;
}
.card{
background:rgba(255,255,255,.07);
padding:25px;
border-radius:25px;
}
.card h2{font-size:42px;margin-top:10px}
.panel{
background:rgba(255,255,255,.07);
padding:25px;
border-radius:30px;
overflow:auto;
}
table{width:100%;min-width:700px;border-collapse:collapse}
th,td{padding:18px;text-align:left}
td{border-top:1px solid rgba(255,255,255,.06)}
.badge{
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:700;
}
.active{background:#163d2a;color:#4ade80}
.bannedStatus{background:#4a1c1c;color:#f87171}
</style>
</head>
<body>
<div class="wrap">

<div class="top">
<div>
<h1>NEXO DB</h1>
<p>Whitelist Pair Control Panel</p>
</div>
<div>
<input placeholder="Cari nomor" onkeyup="searchNum(this.value)">
<button class="add" onclick="addNum()">+ Add</button>
</div>
</div>

<div class="cards">
<div class="card"><small>Total Access</small><h2 id="total">0</h2></div>
<div class="card"><small>Allowed</small><h2 id="active">0</h2></div>
<div class="card"><small>Banned</small><h2 id="banned">0</h2></div>
</div>

<div class="panel">
<table>
<thead>
<tr>
<th>No</th>
<th>Number</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>

<script>
let all=[]
let filtered=[]
let banned=[]

async function loadDb(){
let r=await fetch('/api/db')
let db=await r.json()

all=db.access||[]
banned=db.banned||[]
filtered=[...all]

render()
}

function render(){
rows.innerHTML=''

filtered.forEach((num,i)=>{
let isBanned=banned.includes(num)

rows.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${num}</td>
<td>
<span class="badge ${isBanned?'bannedStatus':'active'}">
${isBanned?'banned':'active'}
</span>
</td>
<td>
${!isBanned
?`<button class='ban' onclick="act('ban','${num}')">Ban</button>`
:`<button class='unban' onclick="act('unban','${num}')">Unban</button>`}
<button class='del' onclick="delNum('${num}')">Delete</button>
</td>
</tr>
`
})

document.getElementById('total').innerText=all.length
document.getElementById('banned').innerText=banned.length
document.getElementById('active').innerText=all.length-banned.length
}

async function act(action,number){
await fetch('/api/db',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({action,number})
})
loadDb()
}

function addNum(){
let n=prompt('Masukkan nomor')
if(!n) return
act('add',n)
}

function delNum(n){
if(confirm('hapus nomor?')){
act('delete',n)
}
}

function searchNum(q){
filtered=all.filter(v=>v.includes(q))
render()
}

loadDb()
</script>
</body>
</html>
