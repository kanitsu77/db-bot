<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXO DB</title>
<style>
body{
background:#0f172a;
color:#fff;
font-family:sans-serif;
padding:30px
}
button{
padding:10px 16px;
margin:4px;
border:0;
border-radius:10px;
cursor:pointer
}
input{
padding:12px;
border-radius:10px;
border:0
}
.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px
}
table{
width:100%;
border-collapse:collapse
}
td,th{
padding:14px;
border-bottom:1px solid #334155
}
</style>
</head>
<body>

<h1>NEXO DATABASE</h1>

<div class="card">
<input id="search" placeholder="Search number"
onkeyup="search(this.value)">
<button onclick="addNum()">
+1 Add
</button>
<button onclick="loadDb()">
Refresh
</button>
</div>

<div class="card">
Total:
<span id="total">0</span>
|
Banned:
<span id="ban">0</span>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>No</th>
<th>Number</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>
</div>

<script>

let data=[]
let filtered=[]

async function loadDb(){

let r=await fetch("/api/db")
let j=await r.json()

data=j.data
filtered=[...data]

render()

}

function render(){

rows.innerHTML=""

filtered.forEach((u,i)=>{

rows.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${u.number}</td>
<td>${u.status}</td>
<td>

<button onclick="banNum('${u.number}')">
Ban
</button>

<button onclick="unbanNum('${u.number}')">
Unban
</button>

<button onclick="delNum('${u.number}')">
Delete
</button>

<button onclick="cekNum('${u.number}')">
Cek
</button>

</td>
</tr>
`

})

total.innerText=data.length
ban.innerText=
data.filter(
v=>v.status=="banned"
).length

}

async function post(action,number){

await fetch("/api/db",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action,
number
})
})

loadDb()

}

function addNum(){

let n=prompt("nomor?")
if(!n) return

post("add",n)

}

function banNum(n){
post("ban",n)
}

function unbanNum(n){
post("unban",n)
}

function delNum(n){
if(confirm("hapus?")){
post("delete",n)
}
}

async function cekNum(n){

let r=await fetch(
"/api/ceknomor?nomor="+n
)

let j=await r.json()

alert(
JSON.stringify(
j,null,2
)
)

}

function search(q){

filtered=
data.filter(
v=>v.number.includes(q)
)

render()

}

loadDb()

</script>

</body>
</html>
