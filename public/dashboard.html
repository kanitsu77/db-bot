<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXO DB</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:"";
position:fixed;
width:450px;
height:450px;
background:#2563eb;
filter:blur(160px);
top:-150px;
left:-120px;
opacity:.35;
z-index:-1;
}

body:after{
content:"";
position:fixed;
width:450px;
height:450px;
background:#7c3aed;
filter:blur(160px);
bottom:-150px;
right:-120px;
opacity:.35;
z-index:-1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
}

.left{
display:flex;
align-items:center;
gap:16px;
}

.menu{
font-size:30px;
cursor:pointer;
}

.logo{
font-size:38px;
font-weight:700;
}

.right{
display:flex;
gap:12px;
}

.right input{
background:rgba(255,255,255,.08);
border:0;
outline:none;
color:#fff;
padding:14px 18px;
border-radius:15px;
width:220px;
}

.right button{
border:none;
padding:14px 22px;
border-radius:15px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:#fff;
font-weight:700;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
left:-270px;
width:260px;
height:100%;
background:#111827;
padding:25px;
transition:.3s;
z-index:999;
}

.sidebar.show{
left:0;
}

.close{
text-align:right;
font-size:30px;
cursor:pointer;
margin-bottom:25px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:16px;
margin-bottom:15px;
border-radius:14px;
background:rgba(255,255,255,.05);
text-decoration:none;
color:white;
cursor:pointer;
}

.main{
padding:20px 25px 50px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,.07);
padding:26px;
border-radius:25px;
}

.card h2{
font-size:44px;
margin-top:10px;
}

.tableBox{
margin-top:30px;
background:rgba(255,255,255,.07);
padding:25px;
border-radius:30px;
overflow:auto;
}

table{
width:100%;
min-width:650px;
border-collapse:collapse;
}

th,td{
padding:18px;
text-align:left;
}

td{
border-top:1px solid rgba(255,255,255,.05);
}

.badge{
padding:7px 14px;
border-radius:30px;
font-size:12px;
font-weight:700;
}

.active{
background:#153d2b;
color:#4ade80;
}

.bannedStatus{
background:#4a1d1d;
color:#f87171;
}

.act{
border:none;
padding:10px 14px;
margin-right:8px;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

.ban{background:#ef4444}
.unban{background:#22c55e}
.del{background:#f59e0b}
</style>
</head>
<body>

<div id="sidebar" class="sidebar">

<div class="close"
onclick="closeMenu()">
×
</div>

<h2>NEXO PANEL</h2>

<a onclick="setMode('dashboard')">
Dashboard
</a>

<a onclick="setMode('add')">
Add
</a>

<a onclick="logout()">
Log Out
</a>

</div>


<div class="topbar">

<div class="left">
<div class="menu"
onclick="openMenu()">
☰
</div>

<div class="logo">
NEXO DB
</div>
</div>

<div class="right">
<input
id="globalInput"
placeholder="Type Nomor"
/>

<button
id="globalBtn"
onclick="globalAction()">
Search
</button>
</div>

</div>


<div class="main">

<div class="cards">

<div class="card">
<small>Total Access</small>
<h2 id="total">0</h2>
</div>

<div class="card">
<small>Allowed</small>
<h2 id="allowed">0</h2>
</div>

<div class="card">
<small>Banned</small>
<h2 id="bannedCount">0</h2>
</div>

</div>


<div class="tableBox">
<table>

<thead>
<tr>
<th>No</th>
<th>Number</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rows">
</tbody>

</table>
</div>

</div>



<script>

let mode="dashboard"
let access=[]
let banned=[]

function openMenu(){
sidebar.classList.add("show")
}

function closeMenu(){
sidebar.classList.remove("show")
}

function setMode(v){

mode=v

if(v==="dashboard"){
globalBtn.innerText="Search"
}

if(v==="add"){
globalBtn.innerText="Add"
}

closeMenu()

}

function logout(){
window.location="index.html"
}

async function loadDb(){

let r=await fetch("/api/db")
let db=await r.json()

access=db.access||[]
banned=db.banned||[]

render(access)

}

function render(list){

rows.innerHTML=""

list.forEach((num,i)=>{

let isBanned=
banned.includes(num)

rows.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${num}</td>

<td>
<span class="badge ${
isBanned
?
"bannedStatus"
:
"active"
}">
${isBanned?"banned":"active"}
</span>
</td>

<td>

${
!isBanned
?
`<button class='act ban'
onclick="dbAct('ban','${num}')">
Ban
</button>`
:
`<button class='act unban'
onclick="dbAct('unban','${num}')">
Unban
</button>`
}

<button class='act del'
onclick="dbAct('delete','${num}')">
Delete
</button>

</td>
</tr>
`

})

total.innerText=access.length
allowed.innerText=
access.length-banned.length
bannedCount.innerText=
banned.length

}

async function dbAct(action,number){

await fetch("/api/db",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action,
number
})
})

loadDb()

}

async function globalAction(){

let num=
globalInput.value.trim()

if(!num) return

if(mode==="dashboard"){

let found=
access.filter(
v=>v.includes(num)
)

render(found)

}

if(mode==="add"){

await fetch("/api/db",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"add",
number:num
})
})

globalInput.value=""
loadDb()

}

}

loadDb()

</script>

</body>
  </html>
