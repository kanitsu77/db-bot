<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXO DB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
color:white;
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:"";
position:fixed;
width:500px;
height:500px;
background:#3b82f6;
filter:blur(170px);
top:-150px;
left:-100px;
opacity:.35;
z-index:-1;
}

body:after{
content:"";
position:fixed;
width:500px;
height:500px;
background:#8b5cf6;
filter:blur(170px);
bottom:-180px;
right:-100px;
opacity:.35;
z-index:-1;
}

.wrapper{
display:flex;
min-height:100vh;
}

.sidebar{
width:270px;
padding:30px 22px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border-right:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
height:100vh;
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:35px;
background:linear-gradient(to right,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.dropdown-head{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 18px;
border-radius:18px;
cursor:pointer;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
font-weight:600;
}

.arrow{
transition:.3s;
}

.arrow.rotate{
transform:rotate(180deg);
}

.dropdown-menu{
overflow:hidden;
max-height:500px;
transition:.35s ease;
}

.dropdown-menu.closed{
max-height:0;
}

.dropdown-menu a{
display:block;
padding:14px 18px;
margin-top:12px;
border-radius:16px;
background:rgba(255,255,255,.03);
text-decoration:none;
color:#cbd5e1;
transition:.25s;
}

.dropdown-menu a:hover{
background:rgba(255,255,255,.12);
transform:translateX(5px);
}

.main{
flex:1;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.header h1{
font-size:45px;
}

.header p{
color:#94a3b8;
margin-top:8px;
}

.search{
padding:15px 18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.08);
color:white;
width:300px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
padding:30px;
border-radius:28px;
}

.card h4{
color:#94a3b8;
margin-bottom:14px;
}

.card h2{
font-size:42px;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:14px;
margin-bottom:30px;
}

.actions button{
border:none;
padding:14px 22px;
border-radius:16px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:white;
font-weight:600;
cursor:pointer;
}

.table-wrap{
background:rgba(255,255,255,.08);
padding:28px;
border-radius:30px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
padding:18px;
text-align:left;
color:#94a3b8;
}

td{
padding:18px;
border-top:1px solid rgba(255,255,255,.05);
}

.badge{
padding:8px 14px;
border-radius:30px;
font-size:13px;
font-weight:600;
}

.active{
background:rgba(34,197,94,.2);
color:#4ade80;
}

.banned{
background:rgba(239,68,68,.2);
color:#f87171;
}

.act{
border:none;
padding:9px 14px;
border-radius:12px;
margin-right:8px;
font-weight:600;
color:white;
cursor:pointer;
}

.ban{background:#ef4444}
.unban{background:#22c55e}
.del{background:#f59e0b}

@media(max-width:900px){
.wrapper{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
padding:25px;
}
}
</style>
</head>
<body>

<div class="wrapper">

<aside class="sidebar">

<div class="logo">
NEXO DB
</div>

<div class="dropdown-head" onclick="toggleMenu()">
<span>Dashboard</span>
<span id="arrow" class="arrow">▼</span>
</div>

<div id="menu" class="dropdown-menu">

<a href="#">Add Number</a>
<a href="#">List Database</a>
<a href="#">Ban Number</a>
<a href="#">Unban</a>
<a href="#">Delete</a>

</div>

</aside>

<main class="main">

<div class="header">
<div>
<h1>Welcome Back, Nixx</h1>
<p>GitHub Live Database Control</p>
</div>

<input
class="search"
placeholder="Search..."
onkeyup="searchNumber(this.value)"
>

</div>


<div class="cards">

<div class="card">
<h4>Total User</h4>
<h2 id="total">0</h2>
</div>

<div class="card">
<h4>Banned</h4>
<h2 id="bannedCount">0</h2>
</div>

<div class="card">
<h4>Active</h4>
<h2 id="activeCount">0</h2>
</div>

</div>


<div class="actions">
<button onclick="addNumber()">
+ Add Number
</button>
</div>


<div class="table-wrap">
<table>

<thead>
<tr>
<th>No</th>
<th>Number</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rows">
</tbody>

</table>
</div>

</main>
</div>


<script>

const GITHUB_TOKEN="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"
const OWNER="kanitsu77"
const REPO="db-bot"
const FILE_PATH="database/nomor.json"
const BRANCH="main"

let data=[]
let filtered=[]
let fileSha=""

async function loadDatabase(){

try{

let res=await fetch(
`https://raw.githubusercontent.com/kanitsu77/db-bot/main/database/nomor.json`,
{
headers:{
Authorization:`Bearer ${GITHUB_TOKEN}`
}
})

let file=await res.json()

fileSha=file.sha

data=JSON.parse(
atob(
file.content.replace(/\n/g,"")
)
)

filtered=[...data]

render()

}catch(e){
alert("Gagal load database")
console.log(e)
}

}

async function saveDatabase(){

let content=btoa(
unescape(
encodeURIComponent(
JSON.stringify(data,null,2)
)
)
)

await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,
{
method:"PUT",
headers:{
Authorization:`Bearer ${GITHUB_TOKEN}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"Update nomor database from panel",
content:content,
sha:fileSha,
branch:BRANCH
})
})

await loadDatabase()

}


function render(){

let rows=document.getElementById("rows")
rows.innerHTML=""

filtered.forEach((u,i)=>{

rows.innerHTML+=`
<tr>

<td>${i+1}</td>

<td>${u.number}</td>

<td>
<span class="badge ${u.status}">
${u.status}
</span>
</td>

<td>

${
u.status==="active"
?
`<button class='act ban'
onclick='banUser(${i})'>
Ban
</button>`
:
`<button class='act unban'
onclick='unbanUser(${i})'>
Unban
</button>`
}

<button class='act del'
onclick='delUser(${i})'>
Delete
</button>

</td>

</tr>
`
})

document.getElementById("total").innerText=data.length
document.getElementById("bannedCount").innerText=
data.filter(v=>v.status=="banned").length

document.getElementById("activeCount").innerText=
data.filter(v=>v.status=="active").length

}


async function addNumber(){

let num=prompt("Masukan nomor")
if(!num) return

data.push({
id:Date.now(),
number:num,
status:"active"
})

await saveDatabase()

}


async function banUser(i){

let user=filtered[i]

let idx=
data.findIndex(v=>v.id===user.id)

data[idx].status="banned"

await saveDatabase()

}


async function unbanUser(i){

let user=filtered[i]

let idx=
data.findIndex(v=>v.id===user.id)

data[idx].status="active"

await saveDatabase()

}


async function delUser(i){

if(!confirm("Delete nomor?")) return

let user=filtered[i]

data=
data.filter(v=>v.id!==user.id)

await saveDatabase()

}


function searchNumber(q){

q=q.toLowerCase()

filtered=
data.filter(v=>
v.number.includes(q)
)

render()

}


function toggleMenu(){

document
.getElementById("menu")
.classList.toggle("closed")

document
.getElementById("arrow")
.classList.toggle("rotate")

}

loadDatabase()

</script>

</body>
  </html>
