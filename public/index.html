<!DOCTYPE html>
<html>
<head>
<title>Verify</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#fff;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:90%;
max-width:350px;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
}
</style>
</head>

<body>
<div class="card">
<h2>Verification</h2>
<input type="password" id="pw" placeholder="Enter Password">
<button onclick="login()">Continue</button>
</div>

<script>
function login(){
let pw = document.getElementById("pw").value
if(pw === "Nixx#123"){
localStorage.setItem("login","true")
location.href="/panel"
}else{
alert("Wrong Password")
}
}
</script>
</body>
</html>
