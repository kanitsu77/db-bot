<!DOCTYPE html>
<html>
<head>
<title>Panel</title>
<style>
body{
background:#fff;
font-family:sans-serif;
margin:0;
padding:20px;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
cursor:pointer;
position:relative;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:30px;
background:white;
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
}

.dropdown div{
padding:10px 20px;
cursor:pointer;
}

.dropdown div:hover{
background:#f1f1f1;
}

/* INPUT */
.input-box{
margin-top:30px;
text-align:center;
}

input{
width:300px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:10px;
padding:15px 30px;
background:#007bff;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

/* LIST */
.list{
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
padding:15px;
border-radius:20px;
margin-bottom:10px;
background:#f9f9f9;
}

.badge{
padding:5px 15px;
border-radius:20px;
color:white;
}

.green{background:green;}
.red{background:red;}
</style>
</head>

<body>

<div class="topbar">
<h3>Panel</h3>

<div class="menu" onclick="toggleMenu()">
☰
<div class="dropdown" id="dropdown">
<div onclick="setMode('add')">add db</div>
<div onclick="setMode('del')">del db</div>
<div onclick="setMode('ban')">add banned</div>
<div onclick="setMode('unban')">del banned</div>
<div onclick="setMode('search')">search</div>
</div>
</div>
</div>

<div class="input-box">
<input id="number" placeholder="628xxx">
<br>
<button onclick="action()" id="btn">Search</button>
</div>

<div class="list" id="list"></div>

<script>
let mode = "search"

function toggleMenu(){
let d = document.getElementById("dropdown")
d.style.display = d.style.display === "block" ? "none" : "block"
}

function setMode(m){
mode = m
document.getElementById("btn").innerText = m.toUpperCase()
}

function getNum(){
return document.getElementById("number").value
}

async function action(){
let num = getNum()

if(mode === "search"){
let res = await fetch("/api/search?num="+num)
alert(await res.text())
}

if(mode === "add"){
await fetch("/api/add",{method:"POST",body:num})
}

if(mode === "del"){
await fetch("/api/delete",{method:"POST",body:num})
}

if(mode === "ban"){
await fetch("/api/banned",{method:"POST",body:num})
}

if(mode === "unban"){
await fetch("/api/unban",{method:"POST",body:num})
}

loadList()
}

async function loadList(){
let res = await fetch("/api/all")
let data = await res.json()

let html = ""

data.allowed.forEach(n=>{
html += `
<div class="item">
${n}
<span class="badge green">DB</span>
</div>`
})

data.banned.forEach(n=>{
html += `
<div class="item">
${n}
<span class="badge red">BANNED</span>
</div>`
})

document.getElementById("list").innerHTML = html
}

loadList()
</script>

</body>
</html>
