<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXO DB Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#3b82f6;
filter:blur(180px);
top:-150px;
left:-100px;
opacity:.45;
animation:float 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:450px;
height:450px;
background:#8b5cf6;
filter:blur(180px);
bottom:-150px;
right:-100px;
opacity:.4;
animation:float 7s infinite alternate;
}

@keyframes float{
from{
transform:translateY(0);
}
to{
transform:translateY(50px);
}
}

.login-box{
width:390px;
padding:45px 35px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:28px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
z-index:2;
}

.logo{
text-align:center;
font-size:42px;
font-weight:700;
background:linear-gradient(to right,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#94a3b8;
font-size:14px;
margin-bottom:35px;
}

.input-box{
position:relative;
margin-bottom:22px;
}

input{
width:100%;
padding:16px 55px 16px 18px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

input:focus{
border-color:#60a5fa;
box-shadow:0 0 18px rgba(96,165,250,.3);
}

input::placeholder{
color:#94a3b8;
transition:.3s;
}

input.error{
border-color:#ef4444;
box-shadow:0 0 15px rgba(239,68,68,.25);
}

input.error::placeholder{
color:#ef4444;
}

.eye-btn{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
cursor:pointer;
width:24px;
height:24px;
}

.eye{
position:absolute;
inset:0;
opacity:0;
transform:scale(.85);
transition:.28s ease;
color:#94a3b8;
}

.eye.active{
opacity:1;
transform:scale(1);
}

.eye svg{
width:22px;
height:22px;
}

.eye-btn:hover .eye{
color:#60a5fa;
}

.login{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-weight:600;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:white;
transition:.3s;
}

.login:hover{
transform:translateY(-3px);
box-shadow:0 8px 22px rgba(59,130,246,.35);
}

.footer{
margin-top:28px;
text-align:center;
font-size:12px;
color:#64748b;
}
</style>
</head>
<body>

<div class="login-box">

<div class="logo">
NIXx DB
</div>

<div class="sub">
Secure Database Panel Access
</div>

<form onsubmit="login(event)">

<div class="input-box">

<input
id="password"
type="password"
placeholder="Enter Password"
required
oninput="resetError()"
>

<button
type="button"
class="eye-btn"
onclick="togglePass()"
>

<span id="eyeOpen" class="eye active">
<svg viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">
<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>

<span id="eyeClose" class="eye">
<svg viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">
<path d="M3 3L21 21"/>
<path d="M10.6 10.7a2 2 0 102.8 2.8"/>
<path d="M9.4 5.2A10.9 10.9 0 0112 5c7 0 11 7 11 7a20.5 20.5 0 01-5 5.9"/>
<path d="M6.6 6.6A20.7 20.7 0 001 12s4 7 11 7c1.9 0 3.5-.4 5-1.2"/>
</svg>
</span>

</button>

</div>

<button class="login">
Login Panel
</button>

</form>

<div class="footer">
© Nixx Database System
</div>

</div>

<script>
function login(e){
e.preventDefault()

let pass=document.getElementById("password")

if(pass.value==="Nixx#Coming"){
alert("Login Berhasil")
location.replace("./dashboard.html")
}else{
pass.value=""
pass.placeholder="Password Salah!"
pass.classList.add("error")
}
}

function resetError(){
let pass=document.getElementById("password")
pass.classList.remove("error")
pass.placeholder="Enter Password"
}

function togglePass(){
let pass=document.getElementById("password")
let open=document.getElementById("eyeOpen")
let close=document.getElementById("eyeClose")

if(pass.type==="password"){
pass.type="text"
open.classList.remove("active")
close.classList.add("active")
}else{
pass.type="password"
close.classList.remove("active")
open.classList.add("active")
}
}
</script>

</body>
  </html>
