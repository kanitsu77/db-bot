<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
background:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
text-align:center;
}
input{
padding:10px;
width:200px;
}
button{
padding:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
<h3>LOGIN</h3>
<input type="password" id="pw">
<br>
<button onclick="login()">ENTER</button>
</div>

<script>
function login(){
let pw = document.getElementById("pw").value
if(pw === "NixxIsHere"){
location.href="/panel"
}else{
alert("Password salah")
}
}
</script>

</body>
</html>
