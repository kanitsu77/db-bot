<!DOCTYPE html>
<html>
<head>
<title>Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#fff;
font-family:sans-serif;
margin:0;
padding:15px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.menu{
font-size:22px;
cursor:pointer;
position:relative;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:30px;
background:white;
border:1px solid #ddd;
border-radius:15px;
overflow:hidden;
width:170px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.dropdown div{
padding:12px;
font-size:14px;
}

.dropdown div:hover{
background:#f1f1f1;
}

.input-box{
margin-top:40px;
text-align:center;
}

input{
width:90%;
max-width:400px;
padding:18px;
border-radius:15px;
border:1px solid #ccc;
font-size:18px;
}

button{
width:90%;
max-width:400px;
margin-top:15px;
padding:18px;
background:#007bff;
border:none;
color:white;
border-radius:15px;
font-size:18px;
}

.list{
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-radius:20px;
margin-bottom:10px;
background:#f5f5f5;
font-size:16px;
}

.badge{
padding:6px 15px;
border-radius:20px;
color:white;
font-size:12px;
}

.green{background:#28a745;}
.red{background:#dc3545;}
</style>
</head>

<body>

<div class="topbar">
<b>Panel</b>

<div class="menu" onclick="toggleMenu()">
☰
<div class="dropdown" id="dropdown">
<div onclick="setMode('add')">add db</div>
<div onclick="setMode('del')">del db</div>
<div onclick="setMode('ban')">add banned</div>
<div onclick="setMode('unban')">del banned</div>
<div onclick="setMode('search')">search</div>
<hr>
<div onclick="logout()" style="color:red;">logout</div>
</div>
</div>
</div>

<div class="input-box">
<input id="number" placeholder="628xxxxxx">
<br>
<button onclick="action()" id="btn">SEARCH</button>
</div>

<div class="list" id="list"></div>

<script>

// proteksi login
if(!localStorage.getItem("login")){
location.href = "/"
}

let mode = "search"

function toggleMenu(){
let d = document.getElementById("dropdown")
d.style.display = d.style.display === "block" ? "none" : "block"
}

function setMode(m){
mode = m
document.getElementById("btn").innerText = m.toUpperCase()
toggleMenu()
}

function logout(){
localStorage.removeItem("login")
location.href="/"
}

function getNum(){
return document.getElementById("number").value
}

async function action(){
let num = getNum()
if(!num) return alert("isi nomor dulu")

if(mode === "search"){
let res = await fetch("/api/search?num="+num)
alert(await res.text())
}

if(mode === "add"){
await fetch("/api/add",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({num})})
}

if(mode === "del"){
await fetch("/api/delete",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({num})})
}

if(mode === "ban"){
await fetch("/api/banned",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({num})})
}

if(mode === "unban"){
await fetch("/api/unban",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({num})})
}

loadList()
}

async function loadList(){
let res = await fetch("/api/all")
let data = await res.json()

let html = ""

data.allowed.forEach(n=>{
html += `<div class="item">${n}<span class="badge green">DB</span></div>`
})

data.banned.forEach(n=>{
html += `<div class="item">${n}<span class="badge red">BANNED</span></div>`
})

document.getElementById("list").innerHTML = html
}

loadList()
</script>

</body>
  </html>
